<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timmy · 上班族減脂教練</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c8a96e;
    --gold-dim: rgba(200,169,110,0.18);
    --gold-border: rgba(200,169,110,0.28);
    --bg: #0d0d0b;
    --bg2: rgba(255,255,255,0.03);
    --bg3: rgba(255,255,255,0.06);
    --text: #f0ede6;
    --text-muted: rgba(240,237,230,0.45);
    --text-dim: rgba(240,237,230,0.22);
    --border: rgba(255,255,255,0.07);
    --radius: 14px;
    --radius-sm: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 48px;
  }

  /* subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .page {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HERO ── */
  .hero {
    padding: 40px 0 32px;
    animation: fadeUp 0.6s 0.05s ease both;
  }

  .avatar {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c8a96e 0%, #7a5728 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', serif;
    font-size: 26px;
    font-weight: 600;
    color: #fdf8ef;
    margin-bottom: 18px;
    border: 1.5px solid rgba(200,169,110,0.35);
    box-shadow: 0 0 32px rgba(200,169,110,0.12);
  }

  .hero-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }

  .hero-tagline {
    font-size: 13.5px;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 18px;
    max-width: 280px;
  }

  .cert-row {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }

  .cert {
    font-size: 11px;
    font-weight: 400;
    padding: 4px 11px;
    border-radius: 20px;
    border: 0.5px solid var(--gold-border);
    color: var(--gold);
    letter-spacing: 0.02em;
  }

  /* ── SECTION ── */
  .section {
    margin-bottom: 10px;
    animation: fadeUp 0.6s ease both;
  }

  .section:nth-child(2) { animation-delay: 0.1s; }
  .section:nth-child(3) { animation-delay: 0.17s; }
  .section:nth-child(4) { animation-delay: 0.24s; }
  .section:nth-child(5) { animation-delay: 0.31s; }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* ── PROGRAM CARD ── */
  .program-card {
    background: var(--gold-dim);
    border: 0.5px solid var(--gold-border);
    border-radius: var(--radius);
    padding: 20px;
    text-decoration: none;
    display: block;
    transition: background 0.18s, transform 0.18s;
    position: relative;
    overflow: hidden;
  }

  .program-card::after {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,169,110,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .program-card:hover {
    background: rgba(200,169,110,0.14);
    transform: translateY(-1px);
  }

  .card-eyebrow {
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge-new {
    background: rgba(200,169,110,0.18);
    border: 0.5px solid var(--gold-border);
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 10px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.04em;
  }

  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .card-desc {
    font-size: 12.5px;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 16px;
  }

  .card-cta {
    font-size: 13px;
    font-weight: 500;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .card-cta svg { transition: transform 0.2s; }
  .program-card:hover .card-cta svg { transform: translateX(3px); }

  /* ── BRAND CARDS ── */
  .brand-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 15px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    margin-bottom: 8px;
    transition: background 0.16s, transform 0.16s;
  }

  .brand-card:hover {
    background: var(--bg3);
    transform: translateY(-1px);
  }

  .brand-card:last-child { margin-bottom: 0; }

  .brand-left {
    display: flex;
    align-items: center;
    gap: 13px;
  }

  .brand-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .brand-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }

  .brand-sub {
    font-size: 11.5px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .brand-arrow {
    color: var(--text-dim);
    font-size: 18px;
    font-weight: 300;
  }

  /* ── COMING SOON ── */
  .coming-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .coming-chip {
    font-size: 11.5px;
    font-weight: 400;
    padding: 6px 13px;
    border-radius: 20px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    color: var(--text-muted);
  }

  /* ── IG BUTTON ── */
  .ig-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    padding: 15px;
    border-radius: var(--radius);
    border: 0.5px solid rgba(255,255,255,0.11);
    background: var(--bg2);
    color: rgba(240,237,230,0.65);
    font-size: 13.5px;
    font-weight: 400;
    font-family: 'DM Sans', sans-serif;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.16s, color 0.16s, transform 0.16s;
    margin-top: 4px;
  }

  .ig-btn:hover {
    background: var(--bg3);
    color: var(--text);
    transform: translateY(-1px);
  }

  /* ── FOOTER ── */
  .footer {
    padding-top: 20px;
    text-align: center;
    font-size: 10.5px;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  /* divider line */
  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 8px 0 18px;
  }
</style>
</head>
<body>
<div class="page">

  <div class="divider"></div>

  <!-- IG -->
  <div class="section">

      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">

</body>
</html>
